<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Il/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas = document.getElementById("water")
const ctx = canvas.getContext("2d")

let width
let height

/* Retina対応 */

const DPR = window.devicePixelRatio || 1

function resize(){

width = window.innerWidth
height = window.innerHeight

canvas.style.width = width + "px"
canvas.style.height = height + "px"

canvas.width = width * DPR
canvas.height = height * DPR

ctx.setTransform(DPR,0,0,DPR,0,0)

}

window.addEventListener("resize",resize)
resize()



/* ダークモード */

let darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches

function updateBackground(){
document.body.style.background = darkMode ? "#000000" : "#ffffff"
}

updateBackground()

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode = e.matches
updateBackground()
})



/* 波紋データ */

let ripples = []

function createRipple(x,y){

ripples.push({
x:x,
y:y,
radius:0,
speed:6 + Math.random()*1.2
})

}



/* タップ入力 */

canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY)
})

canvas.addEventListener("touchstart",e=>{
let t = e.touches[0]
createRipple(t.clientX,t.clientY)
})



/* イルからの反応（21秒） */

function autoRipple(){

createRipple(
Math.random()*width,
Math.random()*height
)

}

setInterval(autoRipple,21000)



/* 更新 */

function update(){

for(let r of ripples){
r.radius += r.speed
}

ripples = ripples.filter(r=>r.radius < 900)

}



/* 完全版レンダリング（リング描画） */

function drawRing(x,y,r,thickness,color){

ctx.beginPath()

ctx.arc(x,y,r,0,Math.PI*2)

ctx.arc(x,y,r-thickness,0,Math.PI*2,true)

ctx.fillStyle = color
ctx.fill()

}



/* 描画 */

function render(){

ctx.clearRect(0,0,width,height)

let t = performance.now()*0.001

ctx.save()

/* 微小な水面ゆらぎ */

ctx.translate(
Math.sin(t*0.7)*0.4,
Math.cos(t*0.6)*0.4
)

for(let r of ripples){

let alpha = 1/(1+r.radius*0.008)

let color = darkMode
? `rgba(170,245,255,${alpha})`
: `rgba(0,0,0,${alpha})`

let thickness = Math.max(1.1, r.radius*0.005)

drawRing(
r.x,
r.y,
r.radius,
thickness,
color
)

}

ctx.restore()

}



/* アニメーション */

function animate(){

update()
render()

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
