<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
  margin:0;
  background:#ffffff;
  overflow:hidden;
}

canvas{
  display:block;
}

@media (prefers-color-scheme: dark) {
  body {
    background: #000000;
  }
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

// ダークモード判定
const isDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;

// 波紋描画
ctx.strokeStyle = isDarkMode
  ? "rgba(255,255,255," + (alpha*1.3) + ")"  // 白に変更
  : "rgba(0,120,255," + (alpha*1.3) + ")";  // 元の青

const canvas = document.getElementById("water")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let ripples=[]
let time=0

function createRipple(x,y){
  ripples.push({
    x:x,
    y:y,
    r:0,
    a:0.5
  })
}

canvas.addEventListener("touchstart",e=>{
  let t=e.touches[0]
  createRipple(t.clientX,t.clientY)
})

canvas.addEventListener("mousedown",e=>{
  createRipple(e.clientX,e.clientY)
})

function ilRipple(){
  let x=Math.random()*canvas.width
  let y=Math.random()*canvas.height
  createRipple(x,y)
  let next=40000+Math.random()*80000
  setTimeout(ilRipple,next)
}

setTimeout(ilRipple,30000)

function drawRipple(r){
  // 波紋同士が重なった時に明るくなる合成モード
  ctx.globalCompositeOperation = "lighter"

  for(let i=0;i<5;i++){
    let delay=i*10
    let radius=r.r-delay

    if(radius>0){
      ctx.beginPath()
      for(let a=0;a<Math.PI*2;a+=0.15){
        let distortion = Math.sin(a*3 + r.r*0.03)*0.25 + Math.sin(a*7 + r.r*0.05)*0.1
        let x=r.x+Math.cos(a)*(radius+distortion)
        let y=r.y+Math.sin(a)*(radius+distortion)
        if(a===0){
          ctx.moveTo(x,y)
        }else{
          ctx.lineTo(x,y)
        }
      }
      ctx.closePath()

      let alpha=r.a*(1-i*0.2)
      ctx.strokeStyle = "rgba(0,120,255,"+(alpha*1.3)+")"
      ctx.lineWidth=0.7
      ctx.stroke()
    }
  }

  // 描画後は通常描画に戻す
  ctx.globalCompositeOperation = "source-over"
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height)

  ctx.filter="blur(1.2px)"

  time+=0.02
  let offset=Math.sin(time)*0.3

  ctx.save()
  ctx.translate(offset,0)

  for(let i=ripples.length-1;i>=0;i--){
    let r=ripples[i]
    drawRipple(r)

    r.r += 3 + r.a * 4 + Math.random()*0.5
    r.a *= 0.992 + Math.random()*0.002

    if(r.a<0.01){
      ripples.splice(i,1)
    }
  }

  ctx.restore()
  ctx.filter="none"

  requestAnimationFrame(animate)
}

animate()
</script>

</body>
</html>
