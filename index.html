<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
}

canvas{
display:block;
}

@media (prefers-color-scheme: dark){
body{
background:#000000;
}
}
</style>

</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const isDarkMode=window.matchMedia("(prefers-color-scheme: dark)").matches;

const width=canvas.width;
const height=canvas.height;

const damping=0.995;

let current=new Float32Array(width*height);
let previous=new Float32Array(width*height);

const image=ctx.createImageData(width,height);
const data=image.data;

function index(x,y){
return x+y*width;
}

function disturb(x,y){

let radius=6;

for(let j=-radius;j<radius;j++){
for(let i=-radius;i<radius;i++){

let dx=x+i;
let dy=y+j;

if(dx>1 && dx<width-1 && dy>1 && dy<height-1){

previous[index(dx,dy)]+=200;

}

}
}

}

canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
disturb(t.clientX,t.clientY);
});

function randomRipple(){

let x=Math.random()*width;
let y=Math.random()*height;

disturb(x,y);

let next=40000+Math.random()*80000;

setTimeout(randomRipple,next);

}

setTimeout(randomRipple,30000);

function update(){

for(let y=1;y<height-1;y++){
for(let x=1;x<width-1;x++){

let i=index(x,y);

current[i]=(
previous[i-1]+
previous[i+1]+
previous[i-width]+
previous[i+width]
)/2-current[i];

current[i]*=damping;

}
}

let temp=previous;
previous=current;
current=temp;

}

function draw(){

for(let y=1;y<height-1;y++){
for(let x=1;x<width-1;x++){

let i=index(x,y);

let dx=previous[i-1]-previous[i+1];
let dy=previous[i-width]-previous[i+width];

let shade=(dx+dy)*0.5;

let color;

if(isDarkMode){

color=220+shade;

}else{

color=150+shade;

}

let p=i*4;

data[p]=color;
data[p+1]=isDarkMode?color:color+40;
data[p+2]=isDarkMode?color:255;
data[p+3]=80;

}
}

ctx.putImageData(image,0,0);

}

function animate(){

update();
draw();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
