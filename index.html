<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
  margin:0;
  background:#ffffff;
  overflow:hidden;
}

canvas{
  display:block;
}

@media (prefers-color-scheme: dark) {
  body {
    background: #000000;
  }
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>
const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ダークモード判定
const isDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;

let ripples = [];
let time = 0;

// 波紋生成時に個体ごとの速度と減衰を設定
function createRipple(x, y){
  ripples.push({
    x: x,
    y: y,
    r: 0,
    a: 0.5,
    speed: 2 + Math.random()*4,       // 基本速度のランダム性を強める
    decay: 0.985 + Math.random()*0.01
  });
}

// タッチ・クリックで波紋生成
canvas.addEventListener("touchstart", e=>{
  let t = e.touches[0];
  createRipple(t.clientX, t.clientY);
});
canvas.addEventListener("mousedown", e=>{
  createRipple(e.clientX, e.clientY);
});

// 自動的にランダムに波紋を発生させる
function ilRipple(){
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height;
  createRipple(x, y);
  let next = 40000 + Math.random()*80000;
  setTimeout(ilRipple, next);
}
setTimeout(ilRipple, 30000);

// 波紋描画
function drawRipple(r){
  ctx.globalCompositeOperation = "lighter"; // 干渉

  for(let i=0; i<5; i++){
    let delay = i*10;
    let radius = r.r - delay;
    if(radius > 0){
      ctx.beginPath();
      for(let a=0; a<Math.PI*2; a+=0.15){
        let distortion = Math.sin(a*3 + r.r*0.03)*0.25 + Math.sin(a*7 + r.r*0.05)*0.1;
        let x = r.x + Math.cos(a)*(radius + distortion);
        let y = r.y + Math.sin(a)*(radius + distortion);
        if(a===0){
          ctx.moveTo(x,y);
        } else {
          ctx.lineTo(x,y);
        }
      }
      ctx.closePath();

      let alpha = r.a*(1 - i*0.2); // 内側ほど少し薄め

      // 線を濃くする
      ctx.strokeStyle = isDarkMode
        ? `rgba(255,255,255,${alpha*1.5})`
        : `rgba(0,120,255,${alpha*1.2})`;

      ctx.lineWidth = 0.8; // 線を濃く
      ctx.stroke();
    }
  }

  ctx.globalCompositeOperation = "source-over";
}

// アニメーション
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.filter = "blur(2px)"; // 線をぼやけさせる
  time += 0.02;
  let offset = Math.sin(time)*0.3;

  ctx.save();
  ctx.translate(offset,0);

  for(let i=ripples.length-1; i>=0; i--){
    let r = ripples[i];
    drawRipple(r);

    // 速度を変則的にランダム化
    r.r += r.speed + r.a*4 + Math.random()*1.0; 
    r.a *= r.decay - Math.random()*0.003;

    if(r.a < 0.01){
      ripples.splice(i,1);
    }
  }

  ctx.restore();
  ctx.filter = "none";

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
