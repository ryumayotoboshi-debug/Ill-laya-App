<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Il/Raya touch</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:#ffffff;
  transition:background 0.3s;
}

canvas{
  display:block;
}
</style>
</head>
<body>

<canvas id="water"></canvas>

<script>
const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

let width, height;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ダークモード判定
let darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
function updateBackground(){
    document.body.style.background = darkMode ? "#000000" : "#ffffff";
}
updateBackground();
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
    darkMode = e.matches;
    updateBackground();
});

// 波紋配列
let ripples = [];

// 波紋生成
function createRipple(x, y){
    ripples.push({
        x: x,
        y: y,
        r: 0,
        a: 0.5,
        speed: 5 + Math.random()*5,      // 広がる速度をランダム化
        decay: 0.970 + Math.random()*0.01,
        maxR: 500 + Math.random()*120      // ランダムな最大半径
    });
}

// pointerdown でタップ／クリックに対応
canvas.addEventListener("pointerdown", e => {
    createRipple(e.clientX, e.clientY);
});

// 自動生成（イルの反応） 21秒ごと
function autoRipple() {
    const x = Math.random() * width;
    const y = Math.random() * height;
    createRipple(x, y); // ランダム位置
    setTimeout(autoRipple, 21000); // 21秒ごと
}
setTimeout(autoRipple, 21000);

// 波紋描画
function drawRipple(r){
    ctx.globalCompositeOperation = "lighter";
    ctx.beginPath();
    const segments = 100;
    for(let i=0; i<=segments; i++){
        const angle = i / segments * Math.PI * 2;
        const distortion = Math.sin(angle*3 + r.r*0.03)*0.3;
        const x = r.x + Math.cos(angle)*(r.r + distortion);
        const y = r.y + Math.sin(angle)*(r.r + distortion);
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }
    ctx.closePath();

    // 透明度を2.5倍にして線を濃く
    const alpha = r.a * 4.0;

    const color = darkMode
        ? `rgba(255,255,255,${alpha})`
        : `rgba(0,0,0,${alpha})`; // ライトモードは黒

    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 6; // 滲み
    ctx.shadowColor = color;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalCompositeOperation = "source-over";
}

// アニメーション
function animate(){
    ctx.clearRect(0,0,width,height);
    for(let i=ripples.length-1; i>=0; i--){
        let r = ripples[i];
        drawRipple(r);
        // 非線形の広がり（初速早く、後半ゆっくり）
        r.r += r.speed * (1 - r.r/r.maxR);
        r.a *= r.decay;
        if(r.a < 0.01 || r.r > r.maxR) ripples.splice(i,1);
    }
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
