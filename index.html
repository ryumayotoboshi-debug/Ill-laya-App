<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>

body{
margin:0;
background:#ffffff;
overflow:hidden;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas = document.getElementById("water")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let ripples=[]
let flashes=[]
let glows=[]
let time=0

function createRipple(x,y){

ripples.push({
x:x,
y:y,
r:0,
a:0.5
})

glows.push({
x:x,
y:y,
r:8,
a:0.4
})

}

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0]
createRipple(t.clientX,t.clientY)
})

canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY)
})

function ilRipple(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height

createRipple(x,y)

let next=40000+Math.random()*80000
setTimeout(ilRipple,next)

}

setTimeout(ilRipple,30000)



function drawRipple(r){

for(let i=0;i<5;i++){

let delay=i*10
let radius=r.r-delay

if(radius>0){

ctx.beginPath()

for(let a=0;a<Math.PI*2;a+=0.15){

let distortion=Math.sin(a*3 + r.r*0.03)*0.25

let x=r.x+Math.cos(a)*(radius+distortion)
let y=r.y+Math.sin(a)*(radius+distortion)

if(a===0){
ctx.moveTo(x,y)
}else{
ctx.lineTo(x,y)
}

}

ctx.closePath()

let alpha=r.a*(1-i*0.2)

/* 色を少し淡く */

ctx.strokeStyle="rgba(0,120,255,"+(alpha*0.85)+")"

/* 線を細く */

ctx.lineWidth=0.7

ctx.stroke()

}

}

}

function drawGlow(g){

ctx.beginPath()

ctx.arc(g.x,g.y,g.r,0,Math.PI*2)

ctx.fillStyle="rgba(120,180,255,"+g.a+")"

ctx.shadowColor="rgba(120,180,255,"+g.a+")"
ctx.shadowBlur=20

ctx.fill()

ctx.shadowBlur=0

}


function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* 全体ぼかし */

ctx.filter="blur(2px)"

time+=0.02
let offset=Math.sin(time)*0.3

ctx.save()
ctx.translate(offset,0)

for(let i=ripples.length-1;i>=0;i--){

for(let i=glows.length-1;i>=0;i--){

let g=glows[i]

drawGlow(g)

g.r+=2
g.a*=0.85

if(g.a<0.02){
glows.splice(i,1)
}

}
let r=ripples[i]

drawRipple(r)

/* 波紋の広がり */

r.r+=4.5

/* 水っぽい減衰 */

r.a*=0.992

if(r.a<0.01){
ripples.splice(i,1)
}

}

ctx.restore()

ctx.filter="none"

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
