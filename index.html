<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let ripples=[];
let time=0;


// 波紋生成
function createRipple(x,y){

ripples.push({

x:x,
y:y,
r:0,

speed:5+Math.random()*2,
alpha:0.35,
decay:0.985,

phase:Math.random()*Math.PI

});

}


// 入力
canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
createRipple(t.clientX,t.clientY);
});


// 自動波紋
function autoRipple(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;

createRipple(x,y);

let next=40000+Math.random()*80000;

setTimeout(autoRipple,next);

}

setTimeout(autoRipple,30000);


// 波紋描画
function drawRipple(r){

ctx.globalCompositeOperation="lighter";

for(let i=0;i<4;i++){

let delay=i*12;
let radius=r.r-delay;

if(radius>0){

ctx.beginPath();

for(let a=0;a<Math.PI*2;a+=0.12){

let distortion=
Math.sin(a*3+r.r*0.03+r.phase)*0.4+
Math.sin(a*7+r.r*0.02)*0.15;

let x=r.x+Math.cos(a)*(radius+distortion);
let y=r.y+Math.sin(a)*(radius+distortion);

if(a===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}

}

ctx.closePath();

ctx.strokeStyle=`rgba(0,120,255,${r.alpha*(1-i*0.25)})`;

ctx.lineWidth=0.8;

ctx.stroke();

}

}

ctx.globalCompositeOperation="source-over";

}


// アニメーション
function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.filter="blur(1.4px)";

for(let i=ripples.length-1;i>=0;i--){

let r=ripples[i];

drawRipple(r);

r.r+=r.speed;

r.speed*=0.985;

r.alpha*=r.decay;

if(r.alpha<0.02){
ripples.splice(i,1);
}

}

ctx.filter="none";

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
