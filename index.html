<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch - Water Ripple</title>

<style>
body {
  margin:0;
  background:#ffffff;
  overflow:hidden;
}

canvas {
  display:block;
}

@media (prefers-color-scheme: dark) {
  body {
    background:#000000;
  }
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>
const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ダークモード判定
const isDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;

let ripples = [];
let time = 0;

// 波紋生成時に個体ごとの速度・減衰・最大半径を設定
function createRipple(x, y) {
  ripples.push({
    x: x,
    y: y,
    r: 0,
    a: 0.5,
    speed: 2 + Math.random()*3,       // 広がる速度
    decay: 0.985 + Math.random()*0.01, // 減衰率
    maxR: 80 + Math.random()*80        // 波紋の最大サイズ
  });
}

// タッチ・クリックで波紋生成
canvas.addEventListener("touchstart", e => {
  const t = e.touches[0];
  createRipple(t.clientX, t.clientY);
});

canvas.addEventListener("mousedown", e => {
  createRipple(e.clientX, e.clientY);
});

// 自動ランダム波紋
function ilRipple() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height;
  createRipple(x, y);
  const next = 40000 + Math.random() * 80000;
  setTimeout(ilRipple, next);
}
setTimeout(ilRipple, 30000);

// 波紋描画
function drawRipple(r) {
  // 波紋同士の干渉を表現
  ctx.globalCompositeOperation = "lighter";

  // 放射状グラデーションで描く
  const gradient = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, r.r);
  const baseColor = isDarkMode ? '255,255,255' : '0,120,255';
  gradient.addColorStop(0, `rgba(${baseColor},${r.a})`);
  gradient.addColorStop(1, `rgba(${baseColor},0)`);

  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
  ctx.fill();

  ctx.globalCompositeOperation = "source-over";
}

// アニメーション
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 波紋をぼかして柔らかく
  ctx.filter = "blur(4px)";

  time += 0.02;
  const offset = Math.sin(time)*0.3;
  ctx.save();
  ctx.translate(offset, 0);

  for(let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    drawRipple(r);

    // 個体ごとに変則的に広がる
    r.r += r.speed + Math.random()*1.5;
    r.a *= r.decay;

    // 最大半径を超えたら消す
    if(r.r > r.maxR || r.a < 0.01){
      ripples.splice(i, 1);
    }
  }

  ctx.restore();
  ctx.filter = "none";

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
