<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d",{alpha:true});

let width;
let height;

function resize(){
width=canvas.width=window.innerWidth;
height=canvas.height=window.innerHeight;
init();
}

window.addEventListener("resize",resize);



/* =========================
   ダークモード
========================= */

let darkMode=window.matchMedia("(prefers-color-scheme: dark)").matches;

function updateBackground(){
document.body.style.background=darkMode ? "#000000" : "#ffffff";
}

updateBackground();

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode=e.matches;
updateBackground();
});



/* =========================
   水面データ
========================= */

let current;
let previous;
let age;

function init(){

current=new Float32Array(width*height);
previous=new Float32Array(width*height);
age=new Float32Array(width*height);

}

resize();



/* =========================
   波生成
========================= */

function disturb(x,y){

let radius=40+Math.random()*30;

for(let j=-radius;j<radius;j++){
for(let i=-radius;i<radius;i++){

let dx=i;
let dy=j;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<radius){

let px=x+i;
let py=y+j;

if(px<0||py<0||px>=width||py>=height) continue;

let index=px+py*width;

current[index]=200*(1-dist/radius);
age[index]=0;

}

}
}

}

canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
disturb(t.clientX,t.clientY);
});



/* =========================
   自動波紋
========================= */

function autoRipple(){

disturb(
Math.random()*width,
Math.random()*height
);

setTimeout(autoRipple,30000+Math.random()*60000);

}

setTimeout(autoRipple,30000);



/* =========================
   波動シミュレーション
========================= */

function simulate(){

for(let y=1;y<height-1;y++){
for(let x=1;x<width-1;x++){

let i=x+y*width;

let val=(
current[i-1]+
current[i+1]+
current[i-width]+
current[i+width]
)/2-previous[i];

val*=0.996;

let damping=1-(age[i]*0.0003);
if(damping<0.8)damping=0.8;

val*=damping;

previous[i]=val;
age[i]++;

}
}

[current,previous]=[previous,current];

}



/* =========================
   描画
========================= */

function render(){

let img=ctx.createImageData(width,height);
let data=img.data;

for(let y=1;y<height-1;y++){
for(let x=1;x<width-1;x++){

let i=x+y*width;

let dx=current[i-1]-current[i+1];
let dy=current[i-width]-current[i+width];

let gradient=Math.sqrt(dx*dx+dy*dy);


/* リング強調 */

let ring=Math.min(gradient*6,1);


/* 微発光 */

let glow=ring*0.5;


/* カラー */

let r,g,b;

if(darkMode){

r=120+glow*120;
g=180+glow*60;
b=255;

}else{

r=60+glow*60;
g=120+glow*40;
b=255;

}


/* アルファ */

let a=Math.max(ring*220,10);


let index=(x+y*width)*4;

data[index]=r;
data[index+1]=g;
data[index+2]=b;
data[index+3]=a;

}
}

ctx.putImageData(img,0,0);

}



/* =========================
   アニメーション
========================= */

function animate(){

simulate();
render();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
