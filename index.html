<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch - Ripple Line</title>

<style>
body {
  margin:0;
  background:#ffffff;
  overflow:hidden;
}

canvas {
  display:block;
}

@media (prefers-color-scheme: dark) {
  body {
    background:#000000;
  }
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>
const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ダークモード判定
const isDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;

let ripples = [];
let time = 0;

// 波紋生成時に個体ごとの速度・減衰・最大半径を設定
function createRipple(x, y) {
  ripples.push({
    x: x,
    y: y,
    r: 0,
    a: 0.5,
    speed: 2 + Math.random()*3,       // 広がる速度のランダム性を強める
    decay: 0.990 + Math.random()*0.005, // 透明度減衰率
    maxR: 60 + Math.random()*100       // 波紋サイズの個体差
  });
}

// タッチ・クリックで波紋生成
canvas.addEventListener("touchstart", e => {
  const t = e.touches[0];
  createRipple(t.clientX, t.clientY);
});
canvas.addEventListener("mousedown", e => {
  createRipple(e.clientX, e.clientY);
});

// 自動ランダム波紋
function ilRipple() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height;
  createRipple(x, y);
  const next = 40000 + Math.random()*80000;
  setTimeout(ilRipple, next);
}
setTimeout(ilRipple, 30000);

// 波紋描画（線）
function drawRipple(r) {
  ctx.globalCompositeOperation = "lighter"; // 波紋が重なったら明るく

  for(let i=0; i<5; i++){
    const delay = i*10;
    const radius = r.r - delay;
    if(radius > 0){
      ctx.beginPath();
      for(let a=0; a<Math.PI*2; a+=0.15){
        const distortion = Math.sin(a*3 + r.r*0.03)*0.25 + Math.sin(a*7 + r.r*0.05)*0.1;
        const x = r.x + Math.cos(a)*(radius + distortion);
        const y = r.y + Math.sin(a)*(radius + distortion);
        if(a===0){
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.closePath();

      const alpha = r.a*(1 - i*0.2);
      const color = isDarkMode
        ? `rgba(255,255,255,${alpha*1.3})`
        : `rgba(0,120,255,${alpha*1.3})`;

      ctx.strokeStyle = color;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }
  }

  ctx.globalCompositeOperation = "source-over";
}

// アニメーション
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.filter = "blur(1.4px)"; // 線を少しぼかす
  time += 0.02;
  const offset = Math.sin(time)*0.3;
  ctx.save();
  ctx.translate(offset, 0);

  for(let i=ripples.length-1; i>=0; i--){
    const r = ripples[i];
    drawRipple(r);

    // 個体ごとに変則的に広がる
    r.r += r.speed + Math.random()*0.5; // 広がり速度をゆらぎ付き
    r.a *= r.decay;

    // 波紋は最大サイズまで広がった後も透明度で徐々に消える
    if(r.a < 0.01){
      ripples.splice(i, 1);
    }
  }

  ctx.restore();
  ctx.filter = "none";

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
