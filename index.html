<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Il/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water")
const ctx=canvas.getContext("2d")

ctx.lineCap="round"
ctx.lineJoin="round"

let width
let height

function resize(){
width=canvas.width=window.innerWidth
height=canvas.height=window.innerHeight
}

window.addEventListener("resize",resize)
resize()



/* ダークモード */

let darkMode=window.matchMedia("(prefers-color-scheme: dark)").matches

function updateBackground(){
document.body.style.background=darkMode?"#000000":"#ffffff"
}

updateBackground()

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode=e.matches
updateBackground()
})



/* 波紋 */

let ripples=[]

function createRipple(x,y){

ripples.push({
x:x,
y:y,
radius:0,
speed:5+Math.random()*1.3,
noiseSeed:Math.random()*1000
})

}



/* 入力 */

canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY)
})

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0]
createRipple(t.clientX,t.clientY)
})



/* 自動波紋 */

function autoRipple(){

createRipple(
Math.random()*width,
Math.random()*height
)

setTimeout(autoRipple,30000+Math.random()*60000)

}

setTimeout(autoRipple,30000)



/* 更新 */

function update(){

for(let r of ripples){

r.radius+=r.speed

}

ripples=ripples.filter(r=>r.radius<900)

}



/* 円ノイズ描画 */

function drawDistortedCircle(cx,cy,radius,noise){

const steps=60
ctx.beginPath()

for(let i=0;i<=steps;i++){

let a=(i/steps)*Math.PI*2

let n=Math.sin(a*4+noise)*1.8

let r=radius+n

let x=cx+Math.cos(a)*r
let y=cy+Math.sin(a)*r

if(i===0){
ctx.moveTo(x,y)
}else{
ctx.lineTo(x,y)
}

}

ctx.closePath()
ctx.stroke()

}



/* 描画 */

const RINGS=3

function render(){

ctx.clearRect(0,0,width,height)

/* 微振動 */

ctx.save()

let t=performance.now()*0.001

ctx.translate(
Math.sin(t*0.7)*0.4,
Math.cos(t*0.6)*0.4
)


for(let r of ripples){

let alpha=1/(1+r.radius*0.008)

let color=darkMode
?`rgba(170,245,255,${alpha})`
:`rgba(0,0,0,${alpha})`

ctx.strokeStyle=color
ctx.shadowBlur=14
ctx.shadowColor=color

let thickness=1.1+r.radius*0.01

let spacing=8+r.radius*0.02


for(let i=0;i<RINGS;i++){

let rad=r.radius-i*spacing

if(rad<=0)continue

ctx.lineWidth=thickness*(1-i*0.25)

drawDistortedCircle(
r.x,
r.y,
rad,
r.noiseSeed+i*2
)

}

}

ctx.restore()

}



/* アニメーション */

function animate(){

update()
render()

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
