<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

let width;
let height;

function resize(){

width=canvas.width=window.innerWidth;
height=canvas.height=window.innerHeight;

init();

}

window.addEventListener("resize",resize);



/* =========================
   水面データ
========================= */

let current;
let previous;
let age;

function init(){

current=new Float32Array(width*height);
previous=new Float32Array(width*height);
age=new Float32Array(width*height);

}

resize();



/* =========================
   波生成
========================= */

function disturb(x,y){

let radius=25+Math.random()*40;

for(let j=-radius;j<radius;j++){
for(let i=-radius;i<radius;i++){

let dx=i;
let dy=j;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<radius){

let px=x+i;
let py=y+j;

if(px<0||py<0||px>=width||py>=height) continue;

let index=px+py*width;

current[index]=180*(1-dist/radius);
age[index]=0;

}

}
}

}



canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
disturb(t.clientX,t.clientY);
});



/* =========================
   自動波紋
========================= */

function autoRipple(){

disturb(
Math.random()*width,
Math.random()*height
);

setTimeout(autoRipple,30000+Math.random()*60000);

}

setTimeout(autoRipple,30000);



/* =========================
   波動シミュレーション
========================= */

function simulate(){

for(let y=1;y<height-1;y++){

for(let x=1;x<width-1;x++){

let i=x+y*width;

let val=(
current[i-1]+
current[i+1]+
current[i-width]+
current[i+width]
)/2-previous[i];

val*=0.995;

/* スペクトル減衰 */

let damping=1-(age[i]*0.0004);
if(damping<0.7)damping=0.7;

val*=damping;

previous[i]=val;

age[i]++;

}

}

[current,previous]=[previous,current];

}



/* =========================
   描画
========================= */

function render(){

let img=ctx.createImageData(width,height);
let data=img.data;

for(let y=1;y<height-1;y++){

for(let x=1;x<width-1;x++){

let i=x+y*width;

/* 法線 */

let dx=current[i-1]-current[i+1];
let dy=current[i-width]-current[i+width];

let nx=dx*0.02;
let ny=dy*0.02;
let nz=1;

/* 屈折 */

let offsetX=Math.floor(x+nx*10);
let offsetY=Math.floor(y+ny*10);

if(offsetX<0)offsetX=0;
if(offsetY<0)offsetY=0;
if(offsetX>=width)offsetX=width-1;
if(offsetY>=height)offsetY=height-1;


/* フレネル反射 */

let fresnel=Math.pow(1-Math.abs(nz),3);


/* subsurface scattering */

let sss=Math.abs(current[i])*0.03;


/* 環境反射（簡易） */

let reflection=180*fresnel;


/* 色 */

let r=220+reflection;
let g=240+sss;
let b=255;

if(r>255)r=255;
if(g>255)g=255;
if(b>255)b=255;

let index=(x+y*width)*4;

data[index]=r;
data[index+1]=g;
data[index+2]=b;
data[index+3]=255;

}

}

ctx.putImageData(img,0,0);

}



/* =========================
   アニメーション
========================= */

function animate(){

simulate();
render();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
