<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

ctx.lineCap="round";
ctx.lineJoin="round";

let width;
let height;

function resize(){
width=canvas.width=window.innerWidth;
height=canvas.height=window.innerHeight;
}

window.addEventListener("resize",resize);
resize();



/* ダークモード */

let darkMode=window.matchMedia("(prefers-color-scheme: dark)").matches;

function updateBackground(){
document.body.style.background=darkMode ? "#000000" : "#ffffff";
}

updateBackground();

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode=e.matches;
updateBackground();
});



/* 波紋 */

let ripples=[];

function createRipple(x,y){

ripples.push({
x:x,
y:y,
radius:0,
speed:1.6+Math.random()*0.6,
alpha:1
});

ripples.push({
x:x,
y:y,
radius:0,
speed:2.2+Math.random()*1.2,
alpha:1
});

}



/* 入力 */

canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
createRipple(t.clientX,t.clientY);
});



/* 自動波紋 */

function autoRipple(){

createRipple(
Math.random()*width,
Math.random()*height
);

setTimeout(autoRipple,30000+Math.random()*60000);

}

setTimeout(autoRipple,30000);



/* 更新 */

function update(){

for(let r of ripples){

r.radius+=r.speed;
r.alpha*=0.985;

}

ripples=ripples.filter(r=>r.alpha>0.02);

}



/* 描画 */

function render(){

ctx.clearRect(0,0,width,height);


/* 微細水面ゆらぎ */

ctx.save();

let t=performance.now()*0.001;

let offsetX=Math.sin(t*0.7)*0.4;
let offsetY=Math.cos(t*0.6)*0.4;

ctx.translate(offsetX,offsetY);


for(let r of ripples){

let alpha=r.alpha;


/* 距離で太さ変化 */

let thickness=0.8+r.radius*0.015;


/* 色 */

if(!darkMode){

ctx.strokeStyle=`rgba(0,0,0,${alpha})`;

}else{

ctx.strokeStyle=`rgba(120,220,255,${alpha})`;

}

ctx.lineWidth=thickness;


/* メイン波紋 */

ctx.beginPath();
ctx.arc(r.x,r.y,r.radius,0,Math.PI*2);
ctx.stroke();


/* サブリング */

for(let i=1;i<=3;i++){

ctx.beginPath();
ctx.arc(r.x,r.y,r.radius+i*6,0,Math.PI*2);

ctx.lineWidth=0.6;

if(!darkMode){

ctx.strokeStyle=`rgba(0,0,0,${alpha*0.35})`;

}else{

ctx.strokeStyle=`rgba(120,220,255,${alpha*0.35})`;

}

ctx.stroke();

}


/* ダークモード微発光 */

if(darkMode){

ctx.beginPath();
ctx.arc(r.x,r.y,r.radius,0,Math.PI*2);

ctx.lineWidth=thickness*3;
ctx.strokeStyle=`rgba(120,220,255,${alpha*0.18})`;
ctx.stroke();

}

}

ctx.restore();

}



/* アニメーション */

function animate(){

update();
render();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
