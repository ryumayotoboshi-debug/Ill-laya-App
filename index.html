<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);


let ripples=[];
let time=0;


// 波紋生成
function createRipple(x,y){

let maxSize=120+Math.random()*200;

ripples.push({

x:x,
y:y,

radius:0,

speed:3+Math.random()*3,

alpha:0.35,

decay:0.986,

max:maxSize,

rings:3+Math.floor(Math.random()*3),

phase:Math.random()*Math.PI*2

});

}


// 入力
canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
createRipple(t.clientX,t.clientY);
});


// 自動波紋
function autoRipple(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;

createRipple(x,y);

let next=30000+Math.random()*60000;

setTimeout(autoRipple,next);

}

setTimeout(autoRipple,30000);


// 波紋描画
function drawRipple(r){

for(let i=0;i<r.rings;i++){

let delay=i*16;
let radius=r.radius-delay;

if(radius<=0) continue;

ctx.beginPath();

for(let a=0;a<Math.PI*2;a+=0.08){

// 波紋干渉
let interference=0;

for(let other of ripples){

let dx=r.x-other.x;
let dy=r.y-other.y;

let dist=Math.sqrt(dx*dx+dy*dy);

interference+=Math.sin(dist*0.05-time*0.04)*0.3;

}

// 水の歪み
let distortion=
Math.sin(a*3+r.radius*0.02+r.phase)*0.6+
Math.sin(a*7+r.radius*0.015)*0.25+
interference;


// 水面微振動
let micro=
Math.sin(time*0.02+a*4)*0.3;

let x=r.x+Math.cos(a)*(radius+distortion+micro);
let y=r.y+Math.sin(a)*(radius+distortion+micro);

if(a===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}

}

ctx.closePath();

let alpha=r.alpha*(1-i*0.25);

// 滲み
ctx.shadowColor="rgba(0,120,255,0.4)";
ctx.shadowBlur=12;

ctx.strokeStyle=`rgba(0,120,255,${alpha})`;

ctx.lineWidth=0.8;

ctx.stroke();

}

}


// アニメーション
function animate(){

time++;

ctx.clearRect(0,0,canvas.width,canvas.height);

// 全体ぼかし
ctx.filter="blur(1.2px)";

for(let i=ripples.length-1;i>=0;i--){

let r=ripples[i];

drawRipple(r);

r.radius+=r.speed;

r.speed*=0.985;

r.alpha*=r.decay;

if(r.radius>r.max || r.alpha<0.02){

ripples.splice(i,1);

}

}

ctx.filter="none";

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
