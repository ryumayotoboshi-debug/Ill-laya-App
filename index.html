<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Water Ripple Simulation</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
}

canvas{
display:block;
}

@media (prefers-color-scheme: dark){
body{
background:#000000;
}
}
</style>

</head>
<body>

<canvas id="water"></canvas>

<script>

const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const isDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;

// グリッド解像度
const size = 6;

const cols = Math.floor(canvas.width / size);
const rows = Math.floor(canvas.height / size);

// 水面データ
let current = [];
let previous = [];

// 初期化
for(let i=0;i<cols;i++){
current[i] = [];
previous[i] = [];
for(let j=0;j<rows;j++){
current[i][j] = 0;
previous[i][j] = 0;
}
}

// 減衰係数（水の粘性）
const damping = 0.995;


// 波紋を発生させる
function disturb(x,y){

let gx = Math.floor(x/size);
let gy = Math.floor(y/size);

if(gx>1 && gx<cols-1 && gy>1 && gy<rows-1){
previous[gx][gy] = 200;
}

}


// タッチ・クリック
canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t = e.touches[0];
disturb(t.clientX,t.clientY);
});


// 自動波紋
function randomRipple(){

let x = Math.random()*canvas.width;
let y = Math.random()*canvas.height;

disturb(x,y);

let next = 40000 + Math.random()*80000;

setTimeout(randomRipple,next);

}

setTimeout(randomRipple,30000);


// シミュレーション更新
function update(){

for(let x=1;x<cols-1;x++){

for(let y=1;y<rows-1;y++){

current[x][y] =
(
previous[x-1][y] +
previous[x+1][y] +
previous[x][y-1] +
previous[x][y+1]
) / 2 - current[x][y];

current[x][y] *= damping;

}

}

// swap
let temp = previous;
previous = current;
current = temp;

}


// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let x=0;x<cols;x++){

for(let y=0;y<rows;y++){

let h = previous[x][y];

if(Math.abs(h) > 1){

let alpha = Math.min(Math.abs(h)/120,0.35);

let color = isDarkMode
? `rgba(255,255,255,${alpha})`
: `rgba(0,120,255,${alpha})`;

ctx.fillStyle = color;

ctx.fillRect(
x*size,
y*size,
size,
size
);

}

}

}

}


// アニメーション
function animate(){

update();

draw();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
