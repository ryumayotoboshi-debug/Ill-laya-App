<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
}

canvas{
display:block;
}

@media (prefers-color-scheme: dark){
body{
background:#000000;
}
}
</style>

</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const isDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;


// 解像度
const size = 2;

const cols = Math.floor(canvas.width/size);
const rows = Math.floor(canvas.height/size);


// 水面配列
let current = [];
let previous = [];

for(let i=0;i<cols;i++){

current[i]=[];
previous[i]=[];

for(let j=0;j<rows;j++){

current[i][j]=0;
previous[i][j]=0;

}

}


// 減衰
const damping = 0.995;


// 波紋発生
function disturb(x,y){

let gx = Math.floor(x/size);
let gy = Math.floor(y/size);

if(gx>1 && gx<cols-1 && gy>1 && gy<rows-1){

previous[gx][gy] = 300;

}

}


// 入力
canvas.addEventListener("mousedown",e=>{

disturb(e.clientX,e.clientY);

});

canvas.addEventListener("touchstart",e=>{

let t = e.touches[0];

disturb(t.clientX,t.clientY);

});


// ランダム波紋
function ilRipple(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;

disturb(x,y);

let next = 40000 + Math.random()*80000;

setTimeout(ilRipple,next);

}

setTimeout(ilRipple,30000);


// 水シミュレーション
function update(){

for(let x=1;x<cols-1;x++){

for(let y=1;y<rows-1;y++){

current[x][y] =
(
previous[x-1][y] +
previous[x+1][y] +
previous[x][y-1] +
previous[x][y+1]
)/2
- current[x][y];

current[x][y] *= damping;

}

}

let temp = previous;
previous = current;
current = temp;

}


// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let x=1;x<cols-1;x++){

for(let y=1;y<rows-1;y++){

let h = previous[x][y] - previous[x+1][y];

let alpha = Math.min(Math.abs(h)/150,0.35);

if(alpha>0.01){

let color = isDarkMode
? `rgba(255,255,255,${alpha})`
: `rgba(0,120,255,${alpha})`;

ctx.fillStyle=color;

ctx.fillRect(
x*size,
y*size,
size,
size
);

}

}

}

}


// アニメーション
function animate(){

update();

draw();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
