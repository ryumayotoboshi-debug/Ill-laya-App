<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>

body{
margin:0;
background:#ffffff;
overflow:hidden;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas = document.getElementById("water")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let ripples=[]
let flashes=[]
let time=0

function createRipple(x,y){

ripples.push({
x:x,
y:y,
r:0,
a:0.5
})

flashes.push({
x:x,
y:y,
r:2,
a:1
})

}

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0]
createRipple(t.clientX,t.clientY)
})

canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY)
})

function ilRipple(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height

createRipple(x,y)

let next=40000+Math.random()*80000
setTimeout(ilRipple,next)

}

setTimeout(ilRipple,30000)

function drawRipple(r){

ctx.filter="blur(1px)"

/* 波紋 */

for(let i=0;i<4;i++){

let delay = i*14
let radius = r.r - delay

if(radius>0){

ctx.beginPath()
ctx.arc(r.x,r.y,radius,0,Math.PI*2)

let alpha = r.a * (1 - i*0.3)

ctx.strokeStyle="rgba(0,120,255,"+alpha+")"
ctx.lineWidth=1.6

ctx.stroke()

}

}

/* 光の歪みリング（先頭の波だけ） */

ctx.beginPath()
ctx.arc(r.x,r.y,r.r+3,0,Math.PI*2)
ctx.strokeStyle="rgba(120,180,255,"+(r.a*0.6)+")"
ctx.lineWidth=4
ctx.stroke()

ctx.filter="none"

}

function drawFlash(f){

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fillStyle="rgba(120,180,255,"+f.a+")"
ctx.fill()

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

time+=0.02
let offset=Math.sin(time)*0.3

ctx.save()
ctx.translate(offset,0)

for(let i=ripples.length-1;i>=0;i--){

let r=ripples[i]

drawRipple(r)

/* 波紋速度アップ */

r.r+=5.0
r.a*=0.985

if(r.a<0.01){
ripples.splice(i,1)
}

}

for(let i=flashes.length-1;i>=0;i--){

let f=flashes[i]

drawFlash(f)

f.r+=1
f.a*=0.9

if(f.a<0.05){
flashes.splice(i,1)
}

}

ctx.restore()

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
