<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
initGrid();
}
window.addEventListener("resize",resize);


// ダークモード
let darkMode=window.matchMedia("(prefers-color-scheme: dark)").matches;

function updateBackground(){
document.body.style.background=darkMode?"#000000":"#ffffff";
}

updateBackground();

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode=e.matches;
updateBackground();
});


// ===== 水面グリッド =====

const scale=4; // 解像度（大きいほど軽い）

let cols;
let rows;

let current=[];
let previous=[];

function initGrid(){

cols=Math.floor(canvas.width/scale);
rows=Math.floor(canvas.height/scale);

current=new Array(cols*rows).fill(0);
previous=new Array(cols*rows).fill(0);

}

resize();


// 波発生
function disturb(x,y){

let gx=Math.floor(x/scale);
let gy=Math.floor(y/scale);

let i=gx+gy*cols;

if(i>=0 && i<current.length){

current[i]=120;

}

}


// 入力
canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
disturb(t.clientX,t.clientY);
});


// 自動波紋
function autoRipple(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;

disturb(x,y);

setTimeout(autoRipple,30000+Math.random()*60000);

}

setTimeout(autoRipple,30000);


// 波動計算
function simulate(){

for(let x=1;x<cols-1;x++){

for(let y=1;y<rows-1;y++){

let i=x+y*cols;

let sum=
current[i-1]+
current[i+1]+
current[i-cols]+
current[i+cols];

let val=sum/2-previous[i];

val*=0.995;

previous[i]=val;

}

}

[current,previous]=[previous,current];

}


// 描画
function render(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let x=1;x<cols-1;x++){

for(let y=1;y<rows-1;y++){

let i=x+y*cols;

let h=current[i];

if(Math.abs(h)<0.5) continue;

let alpha=Math.min(Math.abs(h)/120,1);

if(darkMode){

ctx.fillStyle=`rgba(200,255,255,${alpha})`;

}else{

ctx.fillStyle=`rgba(0,120,255,${alpha})`;

}

ctx.fillRect(
x*scale,
y*scale,
scale,
scale
);

}

}

}


// アニメーション
function animate(){

simulate();
render();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
