<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();

window.addEventListener("resize",resize);


// ダークモード判定
let darkMode=window.matchMedia("(prefers-color-scheme: dark)").matches;


// 背景
function updateBackground(){
document.body.style.background=darkMode?"#000000":"#ffffff";
}
updateBackground();


// 波紋カラー
function rippleBright(alpha){

if(darkMode){
return `rgba(200,255,255,${alpha})`;
}else{
return `rgba(0,120,255,${alpha})`;
}

}

function rippleDark(alpha){

if(darkMode){
return `rgba(120,200,255,${alpha*0.6})`;
}else{
return `rgba(0,80,200,${alpha*0.6})`;
}

}


let ripples=[];
let time=0;


// 波紋生成
function createRipple(x,y){

let baseSpeed=6+Math.random()*2;

ripples.push({

x:x,
y:y,

radius:0,

baseSpeed:baseSpeed,

alpha:0.38,

decay:0.987,

max:120+Math.random()*220,

rings:3+Math.floor(Math.random()*3),

phase:Math.random()*Math.PI*2

});

}


// 入力
canvas.addEventListener("mousedown",e=>{
createRipple(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
createRipple(t.clientX,t.clientY);
});


// 自動波紋
function autoRipple(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;

createRipple(x,y);

let next=30000+Math.random()*60000;

setTimeout(autoRipple,next);

}

setTimeout(autoRipple,30000);


// 波紋描画
function drawRipple(r){

for(let i=0;i<r.rings;i++){

let delay=i*18;
let radius=r.radius-delay;

if(radius<=0) continue;

let points=[];

for(let a=0;a<Math.PI*2;a+=0.08){

// 干渉
let interference=0;

for(let other of ripples){

let dx=r.x-other.x;
let dy=r.y-other.y;

let dist=Math.sqrt(dx*dx+dy*dy);

interference+=Math.sin(dist*0.05-time*0.04)*0.25;

}


// 歪み
let distortion=
Math.sin(a*3+r.radius*0.02+r.phase)*0.6+
Math.sin(a*7+r.radius*0.015)*0.25+
interference;


// 微振動
let micro=Math.sin(time*0.02+a*4)*0.3;


let x=r.x+Math.cos(a)*(radius+distortion+micro);
let y=r.y+Math.sin(a)*(radius+distortion+micro);

points.push({x,y,a});

}

let alpha=r.alpha*(1-i*0.25);


// 山（明るい線）
ctx.beginPath();

points.forEach((p,index)=>{

let offset=1.2;

let x=p.x+Math.cos(p.a)*offset;
let y=p.y+Math.sin(p.a)*offset;

if(index===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}

});

ctx.closePath();

ctx.shadowColor=rippleBright(0.9);
ctx.shadowBlur=20;

ctx.strokeStyle=rippleBright(alpha);

ctx.lineWidth=1;

ctx.stroke();


// 谷（暗い線）
ctx.beginPath();

points.forEach((p,index)=>{

let offset=-1.2;

let x=p.x+Math.cos(p.a)*offset;
let y=p.y+Math.sin(p.a)*offset;

if(index===0){
ctx.moveTo(x,y);
}else{
ctx.lineTo(x,y);
}

});

ctx.closePath();

ctx.shadowBlur=0;

ctx.strokeStyle=rippleDark(alpha);

ctx.lineWidth=1;

ctx.stroke();

}

}


// アニメーション
function animate(){

time++;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.filter="blur(1.1px)";

for(let i=ripples.length-1;i>=0;i--){

let r=ripples[i];

drawRipple(r);


// 非線形伝播
let speed=r.baseSpeed/(1+r.radius*0.015);

r.radius+=speed;


// フェード
r.alpha*=r.decay;

if(r.radius>r.max || r.alpha<0.02){

ripples.splice(i,1);

}

}

ctx.filter="none";

requestAnimationFrame(animate);

}

animate();


// OSテーマ変更
window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{

darkMode=e.matches;

updateBackground();

});

</script>

</body>
</html>
