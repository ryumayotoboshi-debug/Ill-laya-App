<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

let width;
let height;

function resize(){
width=canvas.width=window.innerWidth;
height=canvas.height=window.innerHeight;
init();
}

window.addEventListener("resize",resize);



/* =====================
   ダークモード
===================== */

let darkMode=window.matchMedia("(prefers-color-scheme: dark)").matches;

function updateBackground(){
document.body.style.background=darkMode?"#000000":"#ffffff";
}

updateBackground();

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode=e.matches;
updateBackground();
});



/* =====================
   波データ
===================== */

let current;
let previous;

function init(){

current=new Float32Array(width*height);
previous=new Float32Array(width*height);

}

resize();



/* =====================
   波生成
===================== */

function disturb(x,y){

let radius=40;

for(let j=-radius;j<radius;j++){
for(let i=-radius;i<radius;i++){

let dist=Math.sqrt(i*i+j*j);

if(dist<radius){

let px=x+i;
let py=y+j;

if(px<0||py<0||px>=width||py>=height) continue;

let index=px+py*width;

current[index]=400*(1-dist/radius);

}

}
}

}

canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
disturb(t.clientX,t.clientY);
});



/* =====================
   波動シミュレーション
===================== */

function simulate(){

for(let y=1;y<height-1;y++){
for(let x=1;x<width-1;x++){

let i=x+y*width;

let val=(
current[i-1]+
current[i+1]+
current[i-width]+
current[i+width]
)/2-previous[i];

val*=0.995;

previous[i]=val;

}
}

[current,previous]=[previous,current];

}



/* =====================
   描画
===================== */

function render(){

ctx.clearRect(0,0,width,height);

for(let y=1;y<height-1;y+=3){
for(let x=1;x<width-1;x+=3){

let i=x+y*width;

let h=current[i];

let brightness=Math.abs(h)*0.03;

if(brightness<0.02) continue;


/* 屈折 */

let dx=current[i-1]-current[i+1];
let dy=current[i-width]-current[i+width];

let px=x+dx*0.05;
let py=y+dy*0.05;


/* Apple Liquid風ハイライト */

let highlight=Math.min(brightness*2,1);


/* カラー */

let r,g,b,a;

if(darkMode){

r=120+highlight*120;
g=200+highlight*40;
b=255;

}else{

r=0;
g=0;
b=0;

}

a=Math.min(brightness,1);


/* 波紋線 */

ctx.beginPath();
ctx.arc(px,py,brightness*20,0,Math.PI*2);

ctx.lineWidth=0.6;
ctx.strokeStyle=`rgba(${r},${g},${b},${a})`;
ctx.stroke();



/* 微発光 */

if(darkMode){

ctx.beginPath();
ctx.arc(px,py,brightness*30,0,Math.PI*2);

ctx.lineWidth=2;
ctx.strokeStyle=`rgba(120,220,255,${a*0.3})`;
ctx.stroke();

}

}
}

}



/* =====================
   アニメーション
===================== */

function animate(){

simulate();
render();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
