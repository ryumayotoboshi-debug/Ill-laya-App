<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas = document.getElementById("water");
const ctx = canvas.getContext("2d");

let width;
let height;

function resize(){
width = canvas.width = window.innerWidth;
height = canvas.height = window.innerHeight;
init();
}

window.addEventListener("resize",resize);



/* =========================
   ダークモード
========================= */

let darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;

function updateBackground(){
document.body.style.background = darkMode ? "#000000" : "#ffffff";
}

updateBackground();

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode = e.matches;
updateBackground();
});



/* =========================
   水面データ
========================= */

let current;
let previous;

function init(){

current = new Float32Array(width*height);
previous = new Float32Array(width*height);

}

resize();



/* =========================
   波生成
========================= */

function disturb(x,y){

let radius = 40;

for(let j=-radius;j<radius;j++){
for(let i=-radius;i<radius;i++){

let dist = Math.sqrt(i*i + j*j);

if(dist < radius){

let px = x + i;
let py = y + j;

if(px<0 || py<0 || px>=width || py>=height) continue;

let index = px + py*width;

current[index] = 180*(1-dist/radius);

}

}
}

}

canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
disturb(t.clientX,t.clientY);
});



/* =========================
   波動シミュレーション
========================= */

function simulate(){

for(let y=1;y<height-1;y++){
for(let x=1;x<width-1;x++){

let i = x + y*width;

let val = (
current[i-1] +
current[i+1] +
current[i-width] +
current[i+width]
)/2 - previous[i];

val *= 0.995;

previous[i] = val;

}
}

[current,previous] = [previous,current];

}



/* =========================
   描画
========================= */

function render(){

ctx.clearRect(0,0,width,height);

for(let y=2;y<height-2;y+=2){
for(let x=2;x<width-2;x+=2){

let i = x + y*width;

/* 法線（波の勾配） */

let dx = current[i-1] - current[i+1];
let dy = current[i-width] - current[i+width];

let gradient = Math.sqrt(dx*dx + dy*dy);


/* 屈折 */

let refX = x + dx*0.08;
let refY = y + dy*0.08;


/* フレネル風ハイライト */

let highlight = Math.pow(Math.min(gradient*0.03,1),2);


/* Apple Liquid UI風グロー */

let glow = gradient * 0.15;


/* カラー */

let r,g,b,a;

if(darkMode){

r = 120 + highlight*100;
g = 200 + highlight*40;
b = 255;

}else{

r = 0;
g = 0;
b = 0;

}

a = Math.min(gradient*4,1);


/* 波紋線（細かいリング） */

for(let k=0;k<3;k++){

ctx.beginPath();

ctx.arc(
refX,
refY,
gradient*8 + k*2,
0,
Math.PI*2
);

ctx.lineWidth = 0.6;

if(darkMode){

ctx.strokeStyle = `rgba(${r},${g},${b},${a*0.3})`;

}else{

ctx.strokeStyle = `rgba(0,0,0,${a*0.3})`;

}

ctx.stroke();

}


/* グロー */

if(darkMode){

ctx.beginPath();
ctx.arc(refX,refY,gradient*10,0,Math.PI*2);

ctx.lineWidth = 2;
ctx.strokeStyle = `rgba(120,220,255,${glow})`;
ctx.stroke();

}

}
}

}



/* =========================
   アニメーション
========================= */

function animate(){

simulate();
render();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
