<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Il Water</title>

<style>
body{
margin:0;
background:linear-gradient(#0e1624,#05080f);
overflow:hidden;
}
canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

const w = 120
const h = 200

let current = []
let previous = []

for(let i=0;i<w*h;i++){
current[i]=0
previous[i]=0
}

function disturb(x,y){

let ix = Math.floor(x/canvas.width*w)
let iy = Math.floor(y/canvas.height*h)

previous[ix + iy*w] = 255

}

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0]
disturb(t.clientX,t.clientY)
})

canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY)
})

function update(){

for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i = x + y*w

current[i] = (
previous[i-1] +
previous[i+1] +
previous[i-w] +
previous[i+w]
)/2 - current[i]

current[i] *= 0.99

}
}

let temp = previous
previous = current
current = temp

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=x+y*w
let value=previous[i]

ctx.fillStyle=
"rgba(180,210,255,"+(value/255)+")"

ctx.fillRect(
x*canvas.width/w,
y*canvas.height/h,
canvas.width/w,
canvas.height/h
)

}

}

}

function animate(){

update()
draw()
requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
