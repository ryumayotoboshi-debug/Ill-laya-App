<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ill/Raya touch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#ffffff;
transition:background 0.3s;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="water"></canvas>

<script>

const canvas=document.getElementById("water");
const ctx=canvas.getContext("2d");

let width;
let height;

function resize(){
width=canvas.width=window.innerWidth;
height=canvas.height=window.innerHeight;
init();
}

window.addEventListener("resize",resize);


// ダークモード
let darkMode=window.matchMedia("(prefers-color-scheme: dark)").matches;

function updateBackground(){
document.body.style.background=darkMode?"#000":"#fff";
}

updateBackground();

window.matchMedia("(prefers-color-scheme: dark)")
.addEventListener("change",e=>{
darkMode=e.matches;
updateBackground();
});


// ===== 水面データ =====

let current;
let previous;

function init(){

current=new Float32Array(width*height);
previous=new Float32Array(width*height);

}

resize();


// 波発生
function disturb(x,y){

let radius=20+Math.random()*40;

for(let j=-radius;j<radius;j++){
for(let i=-radius;i<radius;i++){

let dx=i;
let dy=j;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<radius){

let index=(x+i)+(y+j)*width;

if(index>0 && index<current.length){

current[index]=150*(1-dist/radius);

}

}

}
}

}


// 入力
canvas.addEventListener("mousedown",e=>{
disturb(e.clientX,e.clientY);
});

canvas.addEventListener("touchstart",e=>{
let t=e.touches[0];
disturb(t.clientX,t.clientY);
});


// 自動波紋
function autoRipple(){

disturb(
Math.random()*width,
Math.random()*height
);

setTimeout(autoRipple,30000+Math.random()*60000);

}

setTimeout(autoRipple,30000);


// 波動計算
function simulate(){

for(let y=1;y<height-1;y++){

for(let x=1;x<width-1;x++){

let i=x+y*width;

let val=(
current[i-1]+
current[i+1]+
current[i-width]+
current[i+width]
)/2-previous[i];

val*=0.995;

previous[i]=val;

}

}

[current,previous]=[previous,current];

}


// 描画（屈折）
function render(){

let img=ctx.createImageData(width,height);
let data=img.data;

for(let y=1;y<height-1;y++){

for(let x=1;x<width-1;x++){

let i=x+y*width;

let dx=current[i-1]-current[i+1];
let dy=current[i-width]-current[i+width];

let offsetX=Math.floor(x+dx*0.05);
let offsetY=Math.floor(y+dy*0.05);

offsetX=Math.max(0,Math.min(width-1,offsetX));
offsetY=Math.max(0,Math.min(height-1,offsetY));

let index=(x+y*width)*4;

let intensity=Math.abs(current[i])*0.6;

if(darkMode){

data[index]=200+intensity;
data[index+1]=255;
data[index+2]=255;

}else{

data[index]=0;
data[index+1]=120+intensity;
data[index+2]=255;

}

data[index+3]=255;

}

}

ctx.putImageData(img,0,0);

}


// アニメーション
function animate(){

simulate();
render();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
